<!DOCTYPE html>
<html>
<head>
    <title>My Bookings | TastyBite</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='booking.css') }}">
    <script src="https://kit.fontawesome.com/fff37026a8.js" crossorigin="anonymous"></script>
</head> 
<body>
    <div class="userdashboard">
        <i class="fa-solid fa-utensils"></i><h4>TastyBite</h4>
        <hr id="line1">
        <a href="{{ url_for('user_dashboard') }}"><button id="b1"><i class="fa-regular fa-house"></i> Search Caterers</button></a><br>
        <div class="mybook">
            <a href="{{ url_for('my_booking') }}"><button id="b"><i class="fa-solid fa-bread-slice"></i> My bookings</button></a><br>
        </div>
        <a href="{{ url_for('my_profile') }}"><button id="b1"><i class="fa-regular fa-user"></i> My Profile</button></a><br>
        <a href="{{ url_for('login') }}"><button id="b1"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</button></a>
    </div>
    
    <div class="booking-status-container">
        <h2 class="section-title"><i class="fa-solid fa-calendar-check"></i> My Bookings</h2>
        <p style="color: #666; margin-bottom: 20px;">Track your catering event bookings</p>
        
        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <button class="tab-btn active" data-status="all">All</button>
            <button class="tab-btn" data-status="pending">Pending</button>
            <button class="tab-btn" data-status="accepted">Accepted</button>
            <button class="tab-btn" data-status="rejected">Rejected</button>
        </div>
        
        <div id="bookingsContainer">
            <p class="loading">Loading bookings...</p>
        </div>
    </div>

    <style>
        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .tab-btn {
            padding: 10px 20px;
            border: 2px solid #880e21;
            background: white;
            color: #880e21;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .tab-btn:hover,
        .tab-btn.active {
            background: #880e21;
            color: white;
        }
        
        .booking-status-container {
            margin-left: 22%;
            padding: 30px;
            max-width: 800px;
        }
        
        .section-title {
            color: #880e21;
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .section-title i {
            margin-right: 10px;
        }
        
        .no-bookings {
            text-align: center;
            padding: 50px;
            color: #888;
        }
        
        .no-bookings i {
            font-size: 60px;
            color: #ddd;
            margin-bottom: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 30px;
            color: #888;
        }
        
        .booking-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 18px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.1);
            border-left: 4px solid #ffa500;
        }
        
        .booking-card.accepted {
            border-left-color: #28a745;
        }
        
        .booking-card.rejected {
            border-left-color: #dc3545;
        }
        
        .booking-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .caterer-name {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }
        
        .status {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .status.pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .status.accepted {
            background: #d4edda;
            color: #155724;
        }
        
        .status.rejected {
            background: #f8d7da;
            color: #721c24;
        }
        
        .booking-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .booking-details p {
            margin: 0;
            color: #555;
            font-size: 14px;
        }
        
        .booking-details i {
            color: #880e21;
            width: 20px;
            margin-right: 8px;
        }
        
        .special-requests {
            margin-top: 15px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            grid-column: span 2;
        }
        
        .special-requests strong {
            color: #880e21;
        }
        
        .cancel-btn {
            margin-top: 15px;
            padding: 10px 20px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .cancel-btn:hover {
            background: #c82333;
        }
    </style>

    <script>
let allBookings = [];

async function loadBookings() {
    try {
        const response = await fetch('/api/bookings');
        allBookings = await response.json();
        displayBookings('all');
    } catch (error) {
        console.error('Error loading bookings:', error);
        document.getElementById('bookingsContainer').innerHTML = 
            '<p class="loading">Error loading bookings. Please refresh the page.</p>';
    }
}

function displayBookings(statusFilter) {
    const container = document.getElementById('bookingsContainer');
    
    let filtered = allBookings;
    if (statusFilter !== 'all') {
        filtered = allBookings.filter(b => b.status === statusFilter);
    }
    
    if (filtered.length === 0) {
        container.innerHTML = `
            <div class="no-bookings">
                <i class="fa-regular fa-calendar-xmark"></i>
                <h3>No bookings found</h3>
                <p>${statusFilter === 'all' ? 'You haven\'t made any bookings yet.' : 'No ' + statusFilter + ' bookings.'}</p>
                <a href="/user_dashboard" style="color: #880e21;">Browse caterers to make a booking</a>
            </div>
        `;
        return;
    }
    
    container.innerHTML = filtered.map(booking => {
        const eventDate = new Date(booking.event_date + 'T00:00:00');
        const formattedDate = eventDate.toLocaleDateString('en-US', {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });
        
        return `
            <div class="booking-card ${booking.status}">
                <div class="booking-header">
                    <span class="caterer-name">${booking.caterer_name}</span>
                    <span class="status ${booking.status}">${booking.status}</span>
                </div>
                <div class="booking-details">
                    <p><i class="fa-regular fa-calendar"></i> ${formattedDate}</p>
                    <p><i class="fa-regular fa-clock"></i> ${booking.event_time || 'Time not specified'}</p>
                    <p><i class="fa-solid fa-location-dot"></i> ${booking.location || 'Location not specified'}</p>
                    <p><i class="fa-solid fa-users"></i> ${booking.guest_count} guests</p>
                    <p><i class="fa-solid fa-phone"></i> ${booking.caterer_phone}</p>
                    <p><i class="fa-solid fa-map-marker-alt"></i> ${booking.caterer_address}</p>
                    ${booking.special_requests ? `
                        <div class="special-requests">
                            <strong>Special Requests:</strong><br>
                            ${booking.special_requests}
                        </div>
                    ` : ''}
                </div>
                ${booking.status === 'pending' ? `
                    <button class="cancel-btn" onclick="cancelBooking(${booking.booking_id})">
                        <i class="fa-solid fa-xmark"></i> Cancel Booking
                    </button>
                ` : ''}
            </div>
        `;
    }).join('');
}

async function cancelBooking(bookingId) {
    if (!confirm('Are you sure you want to cancel this booking?')) return;
    
    try {
        const response = await fetch(`/api/bookings/${bookingId}`, {
            method: 'DELETE'
        });
        
        if (response.ok) {
            loadBookings();
        } else {
            alert('Failed to cancel booking');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('Error cancelling booking');
    }
}

// Filter tabs
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        displayBookings(btn.dataset.status);
    });
});

// Initialize
document.addEventListener('DOMContentLoaded', loadBookings);
    </script>
</body>
</html>
