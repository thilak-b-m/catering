<!DOCTYPE html>
<html>
<head>
    <title>My Profile | TastyBite Caterer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://kit.fontawesome.com/fff37026a8.js" crossorigin="anonymous"></script>
</head> 
<body>

<div class="catererdashboard">
    <i class="fa-solid fa-utensils"></i>
    <h4>TastyBite</h4>

    <hr id="line1">

    <a href="{{ url_for('caterer_dashboard') }}">
        <button id="b1">
            <i class="fa-solid fa-table-cells-large"></i> Overview
        </button>
    </a><br>

    <a href="{{ url_for('manage_menu') }}">
        <button id="b1">
            <i class="fa-regular fa-calendar-minus"></i> Manage Menu
        </button>
    </a><br>

    <a href="{{ url_for('availability') }}">
        <button id="b1">
            <i class="fa-regular fa-calendar-days"></i> Availability
        </button>
    </a><br>

    <a href="{{ url_for('caterer_bookings') }}">
        <button id="b1">
            <i class="fa-solid fa-bread-slice"></i> Booking
        </button>
    </a>

    <div class="cprof">
        <a href="{{ url_for('caterer_profile') }}">
            <button id="b">
                <i class="fa-regular fa-user"></i> My Profile
            </button>
        </a>
    </div>

    <a href="{{ url_for('login') }}">
        <button id="b1">
            <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
        </button>
    </a>
</div>

<div class="profile-container">
    <h1><i class="fa-solid fa-user-gear"></i> My Profile</h1>
    <p class="subtitle">Manage your catering business profile</p>
    
    <div class="profile-card">
        <div class="profile-header">
            <div class="profile-avatar">
                <i class="fa-solid fa-store"></i>
            </div>
            <div class="profile-title">
                <h3 id="displayName">Loading...</h3>
                <p id="displayCuisine"><i class="fa-solid fa-utensils"></i> Loading...</p>
            </div>
        </div>
        
        <form id="profileForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="name"><i class="fa-solid fa-store"></i> Business Name</label>
                    <input type="text" id="name" name="name" placeholder="Your catering business name" required>
                </div>
                
                <div class="form-group">
                    <label for="email"><i class="fa-solid fa-envelope"></i> Email</label>
                    <input type="email" id="email" name="email" placeholder="business@email.com" readonly>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="phone"><i class="fa-solid fa-phone"></i> Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="Contact number" required>
                </div>
                
                <div class="form-group">
                    <label for="fssai"><i class="fa-solid fa-certificate"></i> FSSAI License</label>
                    <input type="text" id="fssai" name="fssai" placeholder="FSSAI license number" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="address"><i class="fa-solid fa-location-dot"></i> Business Address</label>
                <input type="text" id="address" name="address" placeholder="Your business address" required>
            </div>
            
            <div class="form-group">
                <label for="cuisine_type"><i class="fa-solid fa-bowl-food"></i> Cuisine Type</label>
                <select id="cuisine_type" name="cuisine_type">
                    <option value="Multi-cuisine">Multi-cuisine</option>
                    <option value="North Indian">North Indian</option>
                    <option value="South Indian">South Indian</option>
                    <option value="Chinese">Chinese</option>
                    <option value="Continental">Continental</option>
                    <option value="Italian">Italian</option>
                    <option value="Mughlai">Mughlai</option>
                    <option value="Bengali">Bengali</option>
                    <option value="Gujarati">Gujarati</option>
                    <option value="Rajasthani">Rajasthani</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="description"><i class="fa-solid fa-quote-left"></i> Business Description</label>
                <textarea id="description" name="description" rows="4" placeholder="Tell customers about your catering services, specialties, and experience..."></textarea>
            </div>
            
            <button type="submit" class="save-btn">
                <i class="fa-solid fa-floppy-disk"></i> Save Changes
            </button>
        </form>
        
        <p id="message" class="message"></p>
    </div>
</div>

<style>
    .profile-container {
        margin-left: 22%;
        padding: 30px;
        max-width: 700px;
    }
    
    .profile-container h1 {
        font-size: 32px;
        color: #333;
        margin-bottom: 5px;
    }
    
    .profile-container h1 i {
        color: rgb(217, 167, 3);
        margin-right: 10px;
    }
    
    .subtitle {
        color: #666;
        margin-bottom: 30px;
    }
    
    .profile-card {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    
    .profile-header {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 30px;
        padding-bottom: 25px;
        border-bottom: 2px solid #f0f0f0;
    }
    
    .profile-avatar {
        width: 90px;
        height: 90px;
        background: linear-gradient(135deg, rgb(217, 167, 3), #f0c14b);
        border-radius: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .profile-avatar i {
        font-size: 40px;
        color: white;
    }
    
    .profile-title h3 {
        font-size: 24px;
        color: #333;
        margin-bottom: 8px;
    }
    
    .profile-title p {
        color: #888;
        font-size: 14px;
    }
    
    .profile-title p i {
        color: rgb(217, 167, 3);
        margin-right: 5px;
    }
    
    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        font-weight: 600;
        color: #555;
        margin-bottom: 8px;
    }
    
    .form-group label i {
        color: rgb(217, 167, 3);
        margin-right: 8px;
        width: 20px;
    }
    
    .form-group input,
    .form-group select,
    .form-group textarea {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #eee;
        border-radius: 8px;
        font-size: 15px;
        transition: border-color 0.3s;
        box-sizing: border-box;
    }
    
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
        outline: none;
        border-color: rgb(217, 167, 3);
    }
    
    .form-group input[readonly] {
        background: #f8f9fa;
        color: #888;
        cursor: not-allowed;
    }
    
    .save-btn {
        width: 100%;
        padding: 14px;
        background: rgb(217, 167, 3);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: background 0.3s;
    }
    
    .save-btn:hover {
        background: #c9980a;
    }
    
    .message {
        margin-top: 15px;
        padding: 12px;
        border-radius: 8px;
        text-align: center;
        font-weight: 500;
    }
    
    .message.success {
        background: #d4edda;
        color: #155724;
    }
    
    .message.error {
        background: #f8d7da;
        color: #721c24;
    }
    
    @media (max-width: 768px) {
        .form-row {
            grid-template-columns: 1fr;
        }
    }
</style>

<script>
async function loadProfile() {
    try {
        const response = await fetch('/api/caterer/profile');
        const profile = await response.json();
        
        if (profile.error) {
            document.getElementById('message').textContent = 'Please complete your profile';
            document.getElementById('message').className = 'message error';
            return;
        }
        
        document.getElementById('name').value = profile.name || '';
        document.getElementById('email').value = profile.email || '';
        document.getElementById('phone').value = profile.phone || '';
        document.getElementById('address').value = profile.address || '';
        document.getElementById('fssai').value = profile.fssai || '';
        document.getElementById('cuisine_type').value = profile.cuisine_type || 'Multi-cuisine';
        document.getElementById('description').value = profile.description || '';
        
        document.getElementById('displayName').textContent = profile.name || 'Caterer';
        document.getElementById('displayCuisine').innerHTML = '<i class="fa-solid fa-utensils"></i> ' + (profile.cuisine_type || 'Multi-cuisine');
        
    } catch (error) {
        console.error('Error loading profile:', error);
    }
}

document.getElementById('profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const messageEl = document.getElementById('message');
    
    const profileData = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        address: document.getElementById('address').value,
        fssai: document.getElementById('fssai').value,
        cuisine_type: document.getElementById('cuisine_type').value,
        description: document.getElementById('description').value
    };
    
    try {
        const response = await fetch('/api/caterer/profile', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(profileData)
        });
        
        if (response.ok) {
            messageEl.textContent = '✅ Profile updated successfully!';
            messageEl.className = 'message success';
            document.getElementById('displayName').textContent = profileData.name;
            document.getElementById('displayCuisine').innerHTML = '<i class="fa-solid fa-utensils"></i> ' + profileData.cuisine_type;
        } else {
            messageEl.textContent = '❌ Failed to update profile';
            messageEl.className = 'message error';
        }
    } catch (error) {
        messageEl.textContent = '❌ Error updating profile';
        messageEl.className = 'message error';
        console.error('Error:', error);
    }
});

document.addEventListener('DOMContentLoaded', loadProfile);
</script>

</body>
</html>
