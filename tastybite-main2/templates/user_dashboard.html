<!DOCTYPE html>
<html>
<head>
    <title>Dashboard | TastyBite</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://kit.fontawesome.com/fff37026a8.js" crossorigin="anonymous"></script>
</head> 
<body>
    <div class="userdashboard">
        <i class="fa-solid fa-utensils"></i><h4>TastyBite</h4>
        <hr id="line1">

        <div class="search_caterer">
            <a href="{{ url_for('user_dashboard') }}"><button id="b"><i class="fa-regular fa-house"></i> Search Caterers</button></a><br>
        </div>
        <a href="{{ url_for('my_booking') }}"><button id="b1"><i class="fa-solid fa-bread-slice"></i> My bookings</button></a><br>
        <a href="{{ url_for('my_profile') }}"><button id="b1"><i class="fa-regular fa-user"></i> My Profile</button></a><br>
        <a href="{{ url_for('login') }}"><button id="b1"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</button></a>
    </div>

    <div class="welcome">
        <h2>Welcome !!</h2>
        <p>Find the perfect caterer for your special event</p>
        <div class="search">
            <h4>Search Caterers</h4>
            <p>Filter by cuisine, caterer name or location</p><br>
            <input type="text" id="searchbox" placeholder="Search by cuisine or caterer name ...">
            <button id="search">Search</button>
        </div>
        <div id="catererContainer"></div>
    </div>

    <script>
const images = [
    "{{ url_for('static', filename='images/cater1.jpg') }}",
    "{{ url_for('static', filename='images/cater2.avif') }}",
    "{{ url_for('static', filename='images/cater3.jpg') }}",
    "{{ url_for('static', filename='images/cater4.jpg') }}",
    "{{ url_for('static', filename='images/cater5.jpg') }}"
];

const container = document.getElementById("catererContainer");
const searchBox = document.getElementById("searchbox");
const searchBtn = document.getElementById("search");

// Load caterers from API
async function loadCaterers(searchTerm = "") {
    try {
        const url = searchTerm 
            ? `/api/caterers?search=${encodeURIComponent(searchTerm)}`
            : '/api/caterers';
        
        const response = await fetch(url);
        const caterers = await response.json();
        
        displayCaterers(caterers);
    } catch (error) {
        console.error('Error loading caterers:', error);
        container.innerHTML = '<p style="color: #880e21; padding: 20px;">Error loading caterers. Please try again.</p>';
    }
}

function displayCaterers(caterers) {
    container.innerHTML = "";
    
    if (caterers.length === 0) {
        container.innerHTML = '<p style="color: #666; padding: 20px; text-align: center;">No caterers found. Try a different search term.</p>';
        return;
    }

    caterers.forEach(caterer => {
        const card = document.createElement("div");
        card.classList.add("caterer-card");

        const img = document.createElement("img");
        img.src = images[Math.floor(Math.random() * images.length)];
        img.alt = caterer.name;
        img.classList.add("caterer-image");

        const name = document.createElement("h3");
        name.textContent = caterer.name;

        const cuisine = document.createElement("p");
        cuisine.innerHTML = `<strong>🍽️ ${caterer.cuisine_type || 'Multi-cuisine'}</strong>`;
        cuisine.style.color = "#880e21";
        cuisine.style.marginBottom = "5px";

        const info = document.createElement("p");
        info.innerHTML = `
            📞 ${caterer.phone}<br>
            📍 ${caterer.address}
        `;

        const btn = document.createElement("button");
        btn.textContent = "View Details";
        btn.classList.add("view-btn");
        btn.addEventListener("click", () => {
            window.location.href = `/view_caterer/${caterer.caterer_id}`;
        });

        card.append(img, name, cuisine, info, btn);
        container.appendChild(card);
    });
}

// Search functionality
searchBtn.addEventListener("click", () => {
    loadCaterers(searchBox.value.trim());
});

searchBox.addEventListener("keypress", (e) => {
    if (e.key === "Enter") {
        loadCaterers(searchBox.value.trim());
    }
});

// Initial load
document.addEventListener("DOMContentLoaded", () => {
    loadCaterers();
});
    </script>
</body>
</html>
