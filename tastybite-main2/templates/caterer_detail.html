<!DOCTYPE html>
<html>
<head>
    <title>Caterer Details | TastyBite</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://kit.fontawesome.com/fff37026a8.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="c_detail">
        <div class="d2">
            <i class="fa-solid fa-utensils"></i>
            <h4 id="tastybite">TastyBite</h4><br><br>

            <form id="catererDetailForm" action="{{ url_for('submit_caterer_detail') }}" method="post">
                <input type="hidden" id="firebase_uid" name="firebase_uid" value="">
                <input type="email" id="email" name="email" placeholder="Your Email" required><br>
                <input type="text" id="name" name="name" placeholder="Caterer Name" required><br>
                <input type="text" id="phone" name="phone" placeholder="Contact Number" required><br>
                <input type="text" id="address" name="address" placeholder="Business Address" required><br>
                <input type="text" id="fssai" name="fssai" placeholder="FSSAI Permit ID" required><br>

                <button type="submit" id="sub">Register Caterer</button>
            </form>
        </div>
    </div>

    <script>
        // Get firebase_uid and email from sessionStorage
        document.addEventListener('DOMContentLoaded', function() {
            const firebaseUid = sessionStorage.getItem('firebase_uid');
            const email = sessionStorage.getItem('user_email');
            
            if (firebaseUid) {
                document.getElementById('firebase_uid').value = firebaseUid;
            }
            if (email) {
                document.getElementById('email').value = email;
            }
        });
    </script>
</body>
</html>
